{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="greedy-nav__toggle hidden" type="button" aria-label="Open navigation menu"><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist {% if page.url == '/' or page.url == '/index.html' %}selected{% endif %}">
            <a href="{{ base_path }}/">{{ site.title }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
          <li class="masthead__menu-item persist tail theme-toggle-item">
            <button id="theme-toggle" class="theme-switch" type="button" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
              <span class="theme-switch__glow" aria-hidden="true"></span>
              <i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true"></i>
            </button>
          </li>
          <li class="masthead__menu-item persist tail language-toggle-item">
            <button id="language-toggle" class="language-switch" type="button" aria-label="切换到中文" aria-pressed="false" title="切换到中文">
              <i class="fa-solid fa-globe" aria-hidden="true"></i>
              <span id="language-toggle-label" class="language-switch__label">中文</span>
            </button>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
